<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HYA Terminal | Institutional Silo</title>
    
    <!-- Firebase SDKs -->
    <script defer src="/__/firebase/12.10.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/12.10.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.10.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/init.js?useEmulator=false"></script>
    
    <!-- TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    
    <style>
        :root {
            --primary: #00ff41;
            --bg: #050505;
            --panel: #111;
            --accent: #ffa100;
            --dim: #008f11;
            --secondary-bg: #0a0a0a;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { height: 100%; width: 100%; }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 2px solid var(--primary);
            background: var(--panel);
            flex-shrink: 0;
        }
        
        h1 {
            color: #fff;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            margin: 0;
        }
        
        .status-indicator {
            font-size: 11px;
            color: var(--dim);
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dim);
            animation: pulse 1s infinite;
        }
        
        .status-dot.online {
            background: var(--primary);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr auto;
            gap: 1rem;
            padding: 1rem;
            flex: 1;
            overflow: hidden;
        }
        
        .panel {
            background: var(--panel);
            border: 1px solid rgba(0, 255, 65, 0.15);
            border-radius: 6px;
            padding: 1rem;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .panel-title {
            color: var(--accent);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 0.75rem;
            border-bottom: 1px solid var(--dim);
            padding-bottom: 0.5rem;
        }
        
        .ticker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
            overflow-y: auto;
            flex: 1;
        }
        
        .ticker-card {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.1);
            border-radius: 4px;
            padding: 0.75rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .ticker-card:hover {
            border-color: rgba(0, 255, 65, 0.3);
            background: rgba(0, 255, 65, 0.08);
        }
        
        .ticker-symbol {
            color: #fff;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }
        
        .ticker-name {
            color: var(--dim);
            font-size: 9px;
            margin-top: 0.25rem;
        }
        
        .ticker-price {
            color: var(--primary);
            font-weight: bold;
            margin-top: 0.5rem;
            font-size: 12px;
        }
        
        .ticker-delta {
            font-size: 11px;
            font-weight: bold;
            margin-top: 0.25rem;
        }
        
        .delta-up { color: #4ade80; }
        .delta-down { color: #ff4545; }
        
        .chart-container {
            background: var(--secondary-bg);
            border: 1px solid rgba(0, 255, 65, 0.15);
            border-radius: 6px;
            padding: 0.5rem;
            flex: 1;
            overflow: hidden;
        }
        
        #chart {
            width: 100%;
            height: 100%;
        }
        
        .macro-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }
        
        .macro-stat {
            background: rgba(0, 255, 65, 0.03);
            border: 1px solid rgba(0, 255, 65, 0.1);
            border-radius: 4px;
            padding: 0.75rem;
            text-align: center;
        }
        
        .macro-label {
            color: var(--dim);
            font-size: 9px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        
        .macro-value {
            color: #fff;
            font-weight: bold;
            font-size: 13px;
        }
        
        .intel-feed {
            overflow-y: auto;
            flex: 1;
        }
        
        .intel-item {
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
            padding: 0.75rem 0;
            font-size: 11px;
            line-height: 1.4;
        }
        
        .intel-item:last-child { border-bottom: none; }
        
        .intel-time {
            color: var(--dim);
            font-size: 9px;
        }
        
        .intel-tag {
            color: var(--accent);
            font-weight: bold;
            font-size: 9px;
            margin-top: 0.25rem;
        }
        
        .intel-text {
            color: var(--primary);
            margin-top: 0.25rem;
        }
        
        #load-status {
            position: fixed;
            bottom: 8px;
            right: 12px;
            font-size: 9px;
            color: var(--dim);
            z-index: 10;
        }
        
        .scrollbar-hidden::-webkit-scrollbar { width: 4px; }
        .scrollbar-hidden::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-hidden::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }
        
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto auto;
            }
            .macro-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            body { padding: 0; }
            header { padding: 0.75rem; }
            h1 { font-size: 1rem; }
            .main-container { grid-template-columns: 1fr; padding: 0.75rem; gap: 0.75rem; }
            .macro-panel { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🟢 HYA Terminal: Institutional Silo</h1>
        <div class="status-indicator">
            <span class="status-dot online" id="status-dot"></span>
            <span>STATUS: <span id="sys-state">INITIALIZING...</span></span>
        </div>
    </header>
    
    <div class="main-container">
        <!-- Left Panel: Ticker Grid -->
        <div class="panel">
            <div class="panel-title">Market Tickers</div>
            <div class="ticker-grid scrollbar-hidden" id="ticker-grid"></div>
        </div>
        
        <!-- Right Panel: Chart -->
        <div class="chart-container">
            <div id="chart"></div>
        </div>
        
        <!-- Bottom Macro Panel -->
        <div class="panel" style="grid-column: span 2;">
            <div class="panel-title">Macro Corridor Status</div>
            <div class="macro-panel" id="macro-panel">
                <div class="macro-stat">
                    <div class="macro-label">10Y-2Y Spread</div>
                    <div class="macro-value" id="spread-val">-0.15%</div>
                </div>
                <div class="macro-stat">
                    <div class="macro-label">Curve Status</div>
                    <div class="macro-value" id="curve-status">Inverted</div>
                </div>
                <div class="macro-stat">
                    <div class="macro-label">VIX Index</div>
                    <div class="macro-value" id="vix-val">14.2</div>
                </div>
                <div class="macro-stat">
                    <div class="macro-label">Market Mode</div>
                    <div class="macro-value" id="market-mode">Risk-On</div>
                </div>
            </div>
        </div>
        
        <!-- Bottom Intel Feed -->
        <div class="panel" style="grid-column: span 2; max-height: 150px;">
            <div class="panel-title">Live Intelligence Feed</div>
            <div class="intel-feed scrollbar-hidden" id="intel-feed"></div>
        </div>
    </div>

    <div id="load-status">Initializing SDK...</div>

    <script>
        // Default tickers
        const defaultTickers = [
            { symbol: 'SMH', name: 'AI Infrastructure', price: '245.12', delta: '+4.2%', volume: '52.3M' },
            { symbol: 'XLK', name: 'Information Tech', price: '210.45', delta: '+3.1%', volume: '28.1M' },
            { symbol: 'XLF', name: 'Financial Services', price: '42.88', delta: '+2.5%', volume: '95.2M' },
            { symbol: 'SOXX', name: 'Semiconductors', price: '680.15', delta: '+3.8%', volume: '18.4M' }
        ];
        
        // Default intel feed
        const defaultIntel = [
            { time: '14:52', tag: 'DEAL', msg: 'Anthropic secures $5B Pentagon contract. Market reaction: +2.3%.' },
            { time: '14:35', tag: 'TECH', msg: 'Quantum-AI convergence accelerating. Middle-mgmt roles decline 12% YoY.' },
            { time: '14:18', tag: 'MACRO', msg: 'Fed signals hawkish hold. 10Y yield +8bps to 4.15%. Curve flattens.' }
        ];

        function renderTickers(tickers) {
            const grid = document.getElementById('ticker-grid');
            grid.innerHTML = tickers.map(t => `
                <div class="ticker-card">
                    <div class="ticker-symbol">${t.symbol}</div>
                    <div class="ticker-name">${t.name}</div>
                    <div class="ticker-price">$${t.price}</div>
                    <div class="ticker-delta ${t.delta.includes('-') ? 'delta-down' : 'delta-up'}">${t.delta}</div>
                </div>
            `).join('');
        }
        
        function renderIntel(intel) {
            const feed = document.getElementById('intel-feed');
            feed.innerHTML = intel.map(item => `
                <div class="intel-item">
                    <div class="intel-time">${item.time}</div>
                    <div class="intel-tag">[${item.tag}]</div>
                    <div class="intel-text">${item.msg}</div>
                </div>
            `).join('');
        }
        
        // Initialize chart
        const chartContainer = document.getElementById('chart');
        const chart = LightweightCharts.createChart(chartContainer, {
            width: chartContainer.clientWidth,
            height: chartContainer.clientHeight,
            layout: {
                background: { color: '#0a0a0a' },
                textColor: '#00ff41',
            },
            timeScale: { timeVisible: true, secondsVisible: false },
            grid: { horzLines: { color: '#1a1a1a' }, vertLines: { color: '#1a1a1a' } },
        });
        
        const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#4ade80',
            downColor: '#ff4545',
            borderUpColor: '#4ade80',
            borderDownColor: '#ff4545',
            wickUpColor: '#4ade80',
            wickDownColor: '#ff4545',
        });
        
        // Dummy chart data
        candlestickSeries.setData([
            { time: '2026-04-21', open: 240, high: 248, low: 238, close: 245 },
            { time: '2026-04-22', open: 245, high: 252, low: 243, close: 250 },
            { time: '2026-04-23', open: 250, high: 255, low: 248, close: 252 },
            { time: '2026-04-24', open: 252, high: 258, low: 250, close: 256 },
            { time: '2026-04-25', open: 256, high: 260, low: 254, close: 258 },
            { time: '2026-04-26', open: 258, high: 262, low: 256, close: 260 },
            { time: '2026-04-27', open: 260, high: 265, low: 259, close: 263 },
        ]);
        
        chart.timeScale().fitContent();
        
        // Initial render
        renderTickers(defaultTickers);
        renderIntel(defaultIntel);

        document.addEventListener('DOMContentLoaded', function() {
            const loadEl = document.getElementById('load-status');
            const sysState = document.getElementById('sys-state');
            const statusDot = document.getElementById('status-dot');

            try {
                let app = firebase.app();
                loadEl.textContent = `SDK v12.10.0 | ACTIVE`;
                sysState.textContent = 'ONLINE';
                statusDot.classList.add('online');
                
                const db = firebase.firestore();
                
                // Firestore: Market Tickers
                db.collection('market-data')
                    .collection('tickers')
                    .orderBy('timestamp', 'desc')
                    .limit(4)
                    .onSnapshot((snapshot) => {
                        if (!snapshot.empty) {
                            const tickers = snapshot.docs.map(doc => ({
                                symbol: doc.data().symbol,
                                name: doc.data().name,
                                price: doc.data().price,
                                delta: doc.data().delta
                            }));
                            renderTickers(tickers);
                        }
                    });
                
                // Firestore: Intel Feed
                db.collection('intel-feed')
                    .orderBy('timestamp', 'desc')
                    .limit(3)
                    .onSnapshot((snapshot) => {
                        if (!snapshot.empty) {
                            const intel = snapshot.docs.map(doc => ({
                                time: new Date(doc.data().timestamp?.toDate()).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
                                tag: doc.data().tag || 'INFO',
                                msg: doc.data().message
                            }));
                            renderIntel(intel);
                        }
                    });

            } catch (e) {
                console.error(e);
                loadEl.textContent = 'Firebase Error';
                sysState.textContent = 'OFFLINE';
                statusDot.classList.remove('online');
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            chart.applyOptions({ width: chartContainer.clientWidth, height: chartContainer.clientHeight });
        });
    </script>
</body>
</html>
