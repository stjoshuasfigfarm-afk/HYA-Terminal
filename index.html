<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HYA Terminal | Institutional Silo</title>
    <!-- Firebase SDKs -->
    <script
src="https://www.gstatic.com/firebasejs/10.8.0/firebase-ap
p-compat.js"></script>
    <script
src="https://www.gstatic.com/firebasejs/10.8.0/firebase-fi
restore-compat.js"></script>
    <!-- TradingView Widget -->
    <script type="text/javascript"
src="https://s3.tradingview.com/external-embedding/embed-w
idget-ticker-tape.js" async>
    {
      "symbols": [
        { "proName": "FOREXCOM:SPXUSD", "title": "S&P 500"
},
        { "proName": "FOREXCOM:NSXUSD", "title": "US 100"
},
        { "proName": "FX_IDC:EURUSD", "title": "EUR to
USD" },
        { "proName": "BITSTAMP:BTCUSD", "title": "Bitcoin"
},
        { "proName": "BITSTAMP:ETHUSD", "title":
"Ethereum" }
      ],
      "showSymbolLogo": true,
      "colorTheme": "dark",
      "isTransparent": true,
      "displayMode": "adaptive",
      "locale": "en"
    }
    </script>
    <style>
        body { font-family: 'Courier New', Courier,
monospace; background: #050505; color: #00ff41; margin: 0;
padding: 2rem; }
        .grid { display: grid; grid-template-columns:
repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;
margin-top: 2rem; }
        .card { border: 1px solid #333; padding: 1rem;
border-radius: 4px; background: #111; }
        h1 { color: #fff; border-bottom: 2px solid
#00ff41; padding-bottom: 0.5rem; }
        .val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <h1>HYA Terminal: Institutional Silo</h1>
    <div id="data-container" class="grid"></div>

    <script>
        const firebaseConfig = {
            apiKey:
"AIzaSyBuUOSPJOZyhv_lce6tHlU6ke5vcbGR12w",
            authDomain:
"studio-7004868057-a1479.firebaseapp.com",
            projectId: "studio-7004868057-a1479",
            storageBucket:
"studio-7004868057-a1479.firebasestorage.app",
            messagingSenderId: "582416227020",
            appId:
"1:582416227020:web:21d3df727835ac76ea0069"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const container =
document.getElementById('data-container');
        db.collection('market-data').onSnapshot((snapshot)
=> {
            container.innerHTML = '';
            snapshot.forEach((doc) => {
                const d = doc.data();
                container.innerHTML += `
                    <div class="card">
                        <h3>${d.symbol || 'N/A'}</h3>
                        <p>Price: <span
class="val">$${d.price || '0.00'}</span></p>
                        <p>Perf: <span
class="val">${d.delta || '0.0%'}</span></p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
