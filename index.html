<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HYA Terminal | Institutional Silo</title>
    <style>
        :root { --primary: #00ff41; --bg: #050505;
--panel: #111; }
        body { font-family: 'Courier New', Courier,
monospace; background: var(--bg); color: var(--primary);
margin: 0; padding: 2rem; }
        h1 { color: #fff; border-bottom: 2px solid
var(--primary); padding-bottom: 0.5rem; font-size: 1.5rem;
text-transform: uppercase; letter-spacing: 0.2rem; }
        .grid { display: grid; grid-template-columns:
repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;
margin-top: 2rem; }
        .card { border: 1px solid rgba(0, 255, 65, 0.2);
padding: 1.5rem; border-radius: 8px; background: rgba(17,
17, 17, 0.6); backdrop-filter: blur(10px); box-shadow: 0
4px 15px rgba(0,0,0,0.5); }
        h3 { color: #fff; margin-top: 0; text-transform:
uppercase; font-size: 0.9rem; }
        .val { font-weight: bold; color: #fff; }
        .macro-box { border: 1px solid var(--primary);
padding: 1.5rem; background: rgba(0, 255, 65, 0.05); }
        .status-up { color: #4ade80; }
    </style>
</head>
<body>
    <h1>HYA Terminal: Institutional Silo</h1>
    
    <div class="macro-box">
        <h3>Macro Corridor Status</h3>
        <p>10Y-2Y Spread: <span class="val">-0.15%</span>
| Status: <span class="val">Inverted</span></p>
    </div>

    <div class="grid" id="data-container"></div>

    <script>
        const tickers = [
            { symbol: 'SMH', name: 'AI Infrastructure',
price: '245.12', delta: '+4.2%' },
            { symbol: 'XLK', name: 'Information Tech',
price: '210.45', delta: '+3.1%' },
            { symbol: 'XLF', name: 'Financial Services',
price: '42.88', delta: '+2.5%' },
            { symbol: 'SOXX', name: 'Semiconductors',
price: '680.15', delta: '+3.8%' }
        ];
        const container =
document.getElementById('data-container');
        tickers.forEach(d => {
            container.innerHTML += `
                <div class="card">
                    <h3>${d.symbol} - ${d.name}</h3>
                    <p>Price: <span
class="val">$${d.price}</span></p>
                    <p>Performance: <span
class="status-up">${d.delta}</span></p>
                </div>
            `;
        });
    </script>
</body>
</html>
